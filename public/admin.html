<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#5b63f6" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="초대장 관리자" />
    <title>초대장 관리자 대시보드</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="page-header">
      <h1>🛠️ 관리자 대시보드</h1>
      <p>초대장 목록, 짧은 링크, RSVP 응답(참석/불참/동반인원)을 확인할 수 있습니다.</p>
      <p class="notice">보안: ADMIN_KEY를 서버 환경변수로 설정하고 운영하세요.</p>
    </header>

    <main class="admin-wrap">
      <section class="admin-panel">
        <h2>인증</h2>
        <div class="row two">
          <label class="field">
            <span>Admin Key</span>
            <input id="adminKey" type="password" placeholder="서버 ADMIN_KEY 입력" />
          </label>
          <div class="actions" style="align-self:end;">
            <button id="saveKeyBtn" class="btn">키 저장</button>
            <button id="loadBtn" class="btn primary">목록 불러오기</button>
          </div>
        </div>
        <p id="adminStatus" class="status"></p>
      </section>

      <section class="admin-panel">
        <h2>초대장 목록</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>생성일</th>
                <th>이벤트</th>
                <th>제목</th>
                <th>Slug</th>
                <th>참석/불참</th>
                <th>동반합계</th>
                <th>링크</th>
              </tr>
            </thead>
            <tbody id="invitationRows"></tbody>
          </table>
        </div>
      </section>

      <section class="admin-panel">
        <h2>선택된 초대장 RSVP 상세</h2>
        <p id="selectedTitle" class="small">행을 클릭하면 상세를 표시합니다.</p>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>시간</th>
                <th>이름</th>
                <th>연락처</th>
                <th>참석</th>
                <th>동반</th>
                <th>메시지</th>
              </tr>
            </thead>
            <tbody id="rsvpRows"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="/js/pwa.js"></script>
    <script src="/js/admin.js"></script>
  </body>
</html>
